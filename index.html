```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Store Simple GitHub Version</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

:root{
--primary:#27ae60;
}

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#6dd5ed,#2193b0,#cc2b5e,#753a88);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

body.dark{
background:#1e1e1e;
color:white;
}

header{
background:#2c3e50;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#darkToggle{
padding:6px 12px;
border:none;
border-radius:5px;
background:#27ae60;
color:white;
cursor:pointer;
}

.cover{
width:100%;
height:250px;
background:url("https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da") center/cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
font-weight:bold;
text-shadow:2px 2px 10px black;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

input,button{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
width:100%;
}

button{
background:#27ae60;
color:white;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.3);
}

body.dark .card{
background:#2c2c2c;
color:white;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:6px;
}

.price{
font-size:18px;
color:#27ae60;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:red;
}

#dropArea{
border:2px dashed #27ae60;
padding:20px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

#dropArea.dragover{
background:rgba(39,174,96,0.1);
}

</style>
</head>

<body>

<header>

<h1>GM Store Simple</h1>

<button id="darkToggle" onclick="toggleDark()">Dark Mode</button>

</header>

<div class="cover">
Welcome To GM Store
</div>

<div class="container">

<div id="loginPanel">

<h2>Admin Login</h2>

<input id="adminUser" placeholder="Username">

<input type="password" id="adminPass" placeholder="Password">

<button onclick="adminLogin()">Login</button>

</div>

<div id="adminDashboard" style="display:none">

<h2>Add Product</h2>

<input id="pname" placeholder="Product Name">

<input id="price" type="number" placeholder="Price">

<input id="discount" type="number" placeholder="Discount %">

<input id="stock" type="number" placeholder="Stock">

<input id="whatsapp" placeholder="WhatsApp Number">

<input id="category" placeholder="Category" list="categoryList">

<datalist id="categoryList"></datalist>

<div id="dropArea">

<p>Drag & Drop Images Here or Click</p>

<input type="file" id="images" multiple accept="image/*" style="display:none">

</div>

<button onclick="addProduct()">Add Product</button>

<h2>Products</h2>

<div id="productList" class="products"></div>

</div>

</div>

<script>

function toggleDark(){

document.body.classList.toggle("dark");

}

function adminLogin(){

let u=document.getElementById("adminUser").value;

let p=document.getElementById("adminPass").value;

if(u==="admin" && p==="admin"){

document.getElementById("loginPanel").style.display="none";

document.getElementById("adminDashboard").style.display="block";

Swal.fire({icon:"success",title:"Welcome Admin",timer:1200,showConfirmButton:false});

}else{

Swal.fire({icon:"error",title:"Invalid Login"});

}

}

const dropArea=document.getElementById("dropArea");

const fileInput=document.getElementById("images");

dropArea.onclick=()=>fileInput.click();

dropArea.addEventListener("dragover",e=>{

e.preventDefault();

dropArea.classList.add("dragover");

});

dropArea.addEventListener("dragleave",()=>{

dropArea.classList.remove("dragover");

});

dropArea.addEventListener("drop",e=>{

e.preventDefault();

dropArea.classList.remove("dragover");

const dt=new DataTransfer();

for(let file of e.dataTransfer.files){

dt.items.add(file);

}

fileInput.files=dt.files;

});

let products=JSON.parse(localStorage.getItem("products"))||[];

function save(){

localStorage.setItem("products",JSON.stringify(products));

}

function updateCategoryList(){

let list=document.getElementById("categoryList");

list.innerHTML="";

let cats=[...new Set(products.map(p=>p.category))];

cats.forEach(c=>{

let opt=document.createElement("option");

opt.value=c;

list.appendChild(opt);

});

}

function addProduct(){

let name=document.getElementById("pname").value.trim();

let price=document.getElementById("price").value;

let discount=document.getElementById("discount").value||0;

let stock=document.getElementById("stock").value||0;

let whatsapp=document.getElementById("whatsapp").value;

let category=document.getElementById("category").value;

let files=fileInput.files;

if(!name||!price||!whatsapp||files.length===0){

Swal.fire({icon:"error",title:"Fill all fields"});

return;

}

if(files.length>3){

Swal.fire({icon:"error",title:"Max 3 images allowed"});

return;

}

let promises=[];

for(let i=0;i<files.length;i++){

promises.push(new Promise(resolve=>{

let reader=new FileReader();

reader.onload=e=>resolve(e.target.result);

reader.readAsDataURL(files[i]);

}));

}

Promise.all(promises).then(images=>{

products.push({name,price,discount,stock,whatsapp,category,images});

save();

renderProducts();

updateCategoryList();

clearForm();

Swal.fire({icon:"success",title:"Product Added",timer:1000,showConfirmButton:false});

});

}

function clearForm(){

document.getElementById("pname").value="";

document.getElementById("price").value="";

document.getElementById("discount").value="";

document.getElementById("stock").value="";

document.getElementById("whatsapp").value="";

document.getElementById("category").value="";

fileInput.value="";

}

function renderProducts(){

let list=document.getElementById("productList");

list.innerHTML="";

products.forEach((p,i)=>{

let final=(p.price-(p.price*p.discount/100)).toFixed(0);

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${p.images[0]}">

<h3>${p.name}</h3>

<div>Category: ${p.category}</div>

<div class="old">PKR ${p.price}</div>

<div class="price">PKR ${final}</div>

<div>Stock: ${p.stock}</div>

<button onclick="orderProduct(${i})">Order WhatsApp</button>

<button onclick="deleteProduct(${i})" style="background:red">Delete</button>

`;

list.appendChild(card);

});

}

function orderProduct(i){

let p=products[i];

let final=(p.price-(p.price*p.discount/100)).toFixed(0);

window.open(`https://wa.me/${p.whatsapp}?text=I want to order ${p.name} for PKR ${final}`);

}

function deleteProduct(i){

products.splice(i,1);

save();

renderProducts();

updateCategoryList();

}

renderProducts();

updateCategoryList();

</script>

</body>
</html>
```
