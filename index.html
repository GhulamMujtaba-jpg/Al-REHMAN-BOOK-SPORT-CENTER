<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GM Online Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;margin:0;padding:0;background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a1c4fd,#c2e9fb);background-size:400% 400%;animation:bgMove 15s infinite alternate;color:#333;transition:.3s;}
@keyframes bgMove{0%{background-position:left}100%{background-position:right}}
header{background:#2c3e50;color:white;padding:15px;text-align:center;position:sticky;top:0;z-index:100;}
header h1{margin:0;font-size:26px;}
header button{margin:5px;padding:6px 12px;border:none;border-radius:5px;cursor:pointer;background:#3498db;color:white;}
.container{padding:15px;}
input,select,button{padding:6px;margin:4px;border-radius:5px;}
.card{background:white;padding:10px;margin:10px 0;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.2);}
.dashboard{display:flex;flex-wrap:wrap;gap:10px;margin-top:15px;}
.dashboard div{flex:1;background:#3498db;color:white;padding:10px;border-radius:10px;text-align:center;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;margin-top:15px;}
.product-card{background:white;padding:10px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.2);text-align:center;position:relative;}
.product-card img{width:100%;height:150px;object-fit:cover;border-radius:5px;margin-bottom:5px;}
.product-card button{margin-top:5px;background:#27ae60;color:white;border:none;padding:6px 12px;border-radius:5px;cursor:pointer;}
.delete-btn{position:absolute;top:5px;right:5px;background:#e74c3c;color:white;padding:3px 6px;border:none;border-radius:5px;cursor:pointer;}
input[type="file"]{padding:3px;}
.dark{background:#1e1e1e;color:white;}
.dark .product-card{background:#2c2c2c;color:white;}
</style>
</head>
<body>

<header>
<h1>GM Online Store</h1>
<button onclick="toggleDarkMode()">Dark/Light</button>
<button onclick="clearDashboard()">Clear Dashboard</button>
</header>

<div class="container">

<h2>Add Product</h2>
<input id="pname" placeholder="Product Name">
<input type="number" id="price" placeholder="Price (PKR)">
<input type="number" id="discount" placeholder="Discount %">
<input type="number" id="stock" placeholder="Stock">
<input type="text" id="whatsapp" placeholder="WhatsApp Number">
<input type="text" id="category" placeholder="Category Name">
<input type="file" id="pimages" accept="image/*" multiple>
<button onclick="addProduct()">Add Product</button>

<h2>Search Product</h2>
<input id="searchBox" placeholder="Search..." onkeyup="searchProduct()">

<h2>Products</h2>
<div class="products-grid" id="productList"></div>

<h2>Dashboard</h2>
<div class="dashboard">
<div>Total Sales<br><span id="totalSales">0</span></div>
<div>Total Profit<br><span id="totalProfit">0</span></div>
<div>Total Orders<br><span id="totalOrders">0</span></div>
</div>

</div>

<script>
// Initialize
let products = JSON.parse(localStorage.getItem("products")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];

// Save function
function saveData() {
localStorage.setItem("products", JSON.stringify(products));
localStorage.setItem("orders", JSON.stringify(orders));
}

// Dark mode toggle
function toggleDarkMode() {document.body.classList.toggle("dark");}

// Add Product
function addProduct() {
let name=document.getElementById("pname").value;
let price=parseFloat(document.getElementById("price").value);
let discount=parseFloat(document.getElementById("discount").value)||0;
let stock=parseInt(document.getElementById("stock").value)||0;
let whatsapp=document.getElementById("whatsapp").value;
let category=document.getElementById("category").value||"General";
let imageInput=document.getElementById("pimages");

if(!name||!price||!whatsapp||imageInput.files.length===0){alert("Fill all fields");return;}

let images=[];
let loaded=0;
for(let i=0;i<imageInput.files.length && i<5;i++){
let reader=new FileReader();
reader.onload=function(e){
images.push(e.target.result);
loaded++;
if(loaded===Math.min(imageInput.files.length,5)){
products.push({name,price,discount,stock,whatsapp,category,images,sold:0});
saveData();
renderProducts();
}
}
reader.readAsDataURL(imageInput.files[i]);
}
}

// Render Products
function renderProducts() {
let list=document.getElementById("productList");
list.innerHTML="";
products.forEach((p,i)=>{
let card=document.createElement("div");
card.className="product-card";
let discountedPrice=(p.price-(p.price*p.discount/100)).toFixed(2);
let imagesHTML=p.images.map(img=>`<img src="${img}">`).join("");
card.innerHTML=`
<div class="delete-btn" onclick="deleteProduct(${i})">X</div>
${imagesHTML}<br>
<b>${p.name}</b><br>
Category: ${p.category}<br>
Price: PKR ${p.price}<br>
Discount: ${p.discount}%<br>
Final: PKR ${discountedPrice}<br>
Stock: ${p.stock}<br>
<button onclick="orderProduct(${i})">Order via WhatsApp</button>
`;
list.appendChild(card);
});
updateDashboard();
}

// Search
function searchProduct() {
let value=document.getElementById("searchBox").value.toLowerCase();
let filtered=products.filter(p=>p.name.toLowerCase().includes(value)||p.category.toLowerCase().includes(value));
let list=document.getElementById("productList");
list.innerHTML="";
filtered.forEach((p,i)=>{
let card=document.createElement("div");
card.className="product-card";
let discountedPrice=(p.price-(p.price*p.discount/100)).toFixed(2);
let imagesHTML=p.images.map(img=>`<img src="${img}">`).join("");
card.innerHTML=`
<div class="delete-btn" onclick="deleteProduct(${i})">X</div>
${imagesHTML}<br>
<b>${p.name}</b><br>
Category: ${p.category}<br>
Price: PKR ${p.price}<br>
Discount: ${p.discount}%<br>
Final: PKR ${discountedPrice}<br>
Stock: ${p.stock}<br>
<button onclick="orderProduct(${i})">Order via WhatsApp</button>
`;
list.appendChild(card);
});
}

// Order
function orderProduct(i) {
let p=products[i];
if(p.stock<=0){alert("Out of stock!");return;}
p.stock--;
p.sold++;
let discountedPrice=(p.price-(p.price*p.discount/100)).toFixed(2);
orders.push({name:p.name,price:discountedPrice});
saveData();
updateDashboard();
window.open(`https://wa.me/${p.whatsapp}?text=I want to order ${p.name} for PKR ${discountedPrice}`,"_blank");
renderProducts();
}

// Delete Product
function deleteProduct(i){
if(confirm("Delete this product?")){
products.splice(i,1);
saveData();
renderProducts();
}
}

// Dashboard
function updateDashboard() {
let totalSales=orders.reduce((a,o)=>a+parseFloat(o.price),0).toFixed(2);
let totalProfit=orders.reduce((a,o)=>a+parseFloat(o.price)*0.3,0).toFixed(2);
let totalOrders=orders.length;
document.getElementById("totalSales").innerText=totalSales;
document.getElementById("totalProfit").innerText=totalProfit;
document.getElementById("totalOrders").innerText=totalOrders;
}

// Clear Dashboard
function clearDashboard(){
if(confirm("Clear dashboard stats?")){
orders=[];
products.forEach(p=>p.sold=0);
saveData();
updateDashboard();
}
}

// Initial Render
renderProducts();
updateDashboard();
</script>

</body>
</html>
