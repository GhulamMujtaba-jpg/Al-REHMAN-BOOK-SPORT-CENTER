<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Store Simple GitHub Version</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
  --primary:#27ae60;
  --bg-light:#f4f6f9;
  --bg-dark:#1e1e1e;
  --text-light:#000;
  --text-dark:#fff;
}

/* COLORFUL BACKGROUND */
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:linear-gradient(135deg,#6dd5ed,#2193b0,#cc2b5e,#753a88);
  background-size:400% 400%;
  animation:bgMove 10s infinite alternate;
  color:var(--text-light);
  transition:.3s;
}

@keyframes bgMove{
  0%{background-position:left;}
  100%{background-position:right;}
}

body.dark{background:#1e1e1e;color:white;}

header{
  background:#2c3e50;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 10px rgba(0,0,0,.3);
}

header h1{margin:0;}

#darkToggle{
  padding:5px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background:var(--primary);
  color:white;
}

/* COVER PHOTO */
.cover{
  width:100%;
  height:250px;
  background:url("https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da") center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:40px;
  font-weight:bold;
  text-shadow:2px 2px 10px black;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

input,button{
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:none;
  width:100%;
}

button{
  background:var(--primary);
  color:white;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  opacity:.9;
  transform:scale(1.02);
}

button.delete{background:red;}
button.edit{background:#f39c12;}

#dropArea{
  border:2px dashed var(--primary);
  border-radius:10px;
  padding:20px;
  text-align:center;
  color:var(--primary);
  cursor:pointer;
}

#dropArea.dragover{
  background:rgba(39,174,96,0.1);
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  margin-top:20px;
}

.card{
  background:white;
  border-radius:10px;
  padding:10px;
  box-shadow:0 3px 10px rgba(0,0,0,.3);
  transition:.3s;
}

body.dark .card{
  background:#2c2c2c;
  color:white;
}

.card:hover{
  transform:scale(1.03);
  box-shadow:0 5px 15px rgba(0,0,0,.4);
}

.card img.main-img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:6px;
}

.thumb-slider{
  display:flex;
  justify-content:center;
  gap:5px;
  margin-top:5px;
}

.thumb-slider img{
  width:50px;
  height:50px;
  border-radius:4px;
  cursor:pointer;
  border:2px solid transparent;
}

.thumb-slider img.active{
  border-color:var(--primary);
}

.price{
  font-size:18px;
  color:var(--primary);
  font-weight:bold;
}

.old{
  text-decoration:line-through;
  color:red;
}

@media(max-width:768px){
.products{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}
}

</style>
</head>

<body>

<header>
<h1>GM Store Simple</h1>
<button id="darkToggle" onclick="toggleDark()">Dark Mode</button>
</header>

<div class="cover">
Welcome To GM Store
</div>

<div class="container">

<!-- Admin Login -->
<div id="loginPanel">
<h2>Admin Login</h2>

<input type="text" id="adminUser" placeholder="Username">
<input type="password" id="adminPass" placeholder="Password">

<button onclick="adminLogin()">Login</button>
</div>

<!-- Admin Dashboard -->

<div id="adminDashboard" style="display:none;">

<h2>Add / Edit Product</h2>

<input id="pname" placeholder="Product Name">

<input type="number" id="price" placeholder="Price PKR">

<input type="number" id="discount" placeholder="Discount %">

<input type="number" id="stock" placeholder="Stock">

<input id="whatsapp" placeholder="WhatsApp Number">

<input id="category" placeholder="Category" list="categoryList">
<datalist id="categoryList"></datalist>

<div id="dropArea">

<p>Drag & Drop Images Here or Click to Select (Max 3)</p>

<input type="file" id="images" multiple accept="image/*" style="display:none;">

</div>

<button onclick="addProduct()">Add Product</button>

<button id="updateBtn" style="display:none" onclick="updateProduct()">Update Product</button>

<h2>Products</h2>

<div class="products" id="productList"></div>

</div>

</div>

<script>

function toggleDark(){
document.body.classList.toggle('dark');
document.getElementById('darkToggle').textContent=document.body.classList.contains('dark')?'Light Mode':'Dark Mode';
}

function adminLogin(){

let u=document.getElementById("adminUser").value;

let p=document.getElementById("adminPass").value;

if(u==="admin" && p==="admin"){

document.getElementById("loginPanel").style.display="none";

document.getElementById("adminDashboard").style.display="block";

Swal.fire({icon:'success',title:'Welcome Admin',timer:1500,showConfirmButton:false});

}

else{

Swal.fire({icon:'error',title:'Invalid Credentials'});

}

}

/* Drag Drop */

const dropArea=document.getElementById("dropArea");

const fileInput=document.getElementById("images");

dropArea.addEventListener('click',()=>fileInput.click());

dropArea.addEventListener('dragover',e=>{

e.preventDefault();

dropArea.classList.add('dragover');

});

dropArea.addEventListener('dragleave',e=>{

dropArea.classList.remove('dragover');

});

dropArea.addEventListener('drop',e=>{

e.preventDefault();

dropArea.classList.remove('dragover');

fileInput.files=e.dataTransfer.files;

});

/* PRODUCTS */

let products=JSON.parse(localStorage.getItem("products"))||[];

let editIndex=null;

function save(){

localStorage.setItem("products",JSON.stringify(products));

}

function updateCategoryList(){

let list=document.getElementById("categoryList");

let cats=[...new Set(products.map(p=>p.category))];

list.innerHTML="";

cats.forEach(c=>{

let opt=document.createElement("option");

opt.value=c;

list.appendChild(opt);

});

}

function addProduct(){

let name=document.getElementById("pname").value.trim();

let price=Number(document.getElementById("price").value);

let discount=Number(document.getElementById("discount").value)||0;

let stock=document.getElementById("stock").value||0;

let whatsapp=document.getElementById("whatsapp").value.trim();

let category=document.getElementById("category").value.trim();

let files=fileInput.files;

if(!name||!price||!whatsapp||files.length==0){

Swal.fire({icon:'error',title:'Fill all fields'});

return;

}

let promises=[];

for(let i=0;i<files.length;i++){

promises.push(new Promise(resolve=>{

let reader=new FileReader();

reader.onload=e=>resolve(e.target.result);

reader.readAsDataURL(files[i]);

}));

}

Promise.all(promises).then(images=>{

products.push({name,price,discount,stock,whatsapp,category,images});

save();

renderProducts();

updateCategoryList();

clearForm();

});

}

function clearForm(){

document.getElementById("pname").value="";

document.getElementById("price").value="";

document.getElementById("discount").value="";

document.getElementById("stock").value="";

document.getElementById("whatsapp").value="";

document.getElementById("category").value="";

fileInput.value="";

}

function renderProducts(){

let list=document.getElementById("productList");

list.innerHTML="";

products.forEach((p,i)=>{

let final=(p.price-(p.price*p.discount/100)).toFixed(0);

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${p.images[0]}" class="main-img">

<h3>${p.name}</h3>

<div>Category: ${p.category}</div>

<div class="old">PKR ${p.price}</div>

<div class="price">PKR ${final}</div>

<div>Stock: ${p.stock}</div>

<button onclick="orderProduct(${i})">Order WhatsApp</button>

<button onclick="deleteProduct(${i})" class="delete">Delete</button>

`;

list.appendChild(card);

});

}

function orderProduct(i){

let p=products[i];

let final=(p.price-(p.price*p.discount/100)).toFixed(0);

window.open(`https://wa.me/${p.whatsapp}?text=I want to order ${p.name} for PKR ${final}`);

}

function deleteProduct(i){

products.splice(i,1);

save();

renderProducts();

updateCategoryList();

}

renderProducts();

updateCategoryList();

</script>

</body>
</html>
