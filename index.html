<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GM Store Pro</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#6dd5ed,#2193b0,#cc2b5e,#753a88);
background-size:400% 400%;
animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

header{
background:#2c3e50;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#27ae60;
color:white;
margin:3px;
}

input,textarea{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:none;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.3);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:6px;
}

.price{
color:#27ae60;
font-weight:bold;
font-size:18px;
}

.old{
color:red;
text-decoration:line-through;
}

.categoryBlocks{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
margin-bottom:20px;
}

.cat{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.cat img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
}

.sliderBtns{
display:flex;
justify-content:space-between;
}

.searchBar{
width:300px;
padding:6px;
border-radius:6px;
border:none;
}

</style>
</head>

<body>

<header>

<h2>GM Store Pro</h2>

<input class="searchBar" placeholder="Search product..." onkeyup="searchProduct(this.value)">

</header>

<div class="container">

<h2>Categories</h2>
<div id="categoryBlocks" class="categoryBlocks"></div>

<h2>Admin Login</h2>

<input id="adminUser" placeholder="Username">
<input id="adminPass" type="password" placeholder="Password">

<button onclick="adminLogin()">Login</button>

<div id="adminDashboard" style="display:none">

<h2>Add / Edit Product</h2>

<input id="pname" placeholder="Product Name">
<textarea id="description" placeholder="Description"></textarea>

<input id="price" type="number" placeholder="Price">
<input id="discount" type="number" placeholder="Discount %">

<input id="stock" type="number" placeholder="Stock">

<input id="whatsapp" placeholder="WhatsApp Number">

<input id="category" placeholder="Category">

<h3>Category Profile Image</h3>
<input type="file" id="catImage">

<h3>Product Images (Max 5)</h3>
<input type="file" id="images" multiple>

<button onclick="addProduct()">Add Product</button>
<button onclick="updateProduct()">Update Product</button>

</div>

<h2>Products</h2>
<div id="productList" class="products"></div>

</div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[]
let categoryImages=JSON.parse(localStorage.getItem("categoryImages"))||{}
let editIndex=null

function save(){
localStorage.setItem("products",JSON.stringify(products))
}

function adminLogin(){

let u=adminUser.value
let p=adminPass.value

if(u=="admin" && p=="admin"){

adminDashboard.style.display="block"

Swal.fire("Welcome Admin")

}else{

Swal.fire("Wrong Login")

}

}

function addProduct(){

let files=images.files

if(files.length>5){

Swal.fire("Maximum 5 images allowed")
return

}

let name=pname.value
let desc=description.value
let price=priceInput()
let discount=discountInput()
let stock=stockInput()
let whatsapp=whatsappInput()
let category=categoryInput()

let catFile=catImage.files[0]

if(catFile){

let r=new FileReader()

r.onload=function(e){

categoryImages[category]=e.target.result
localStorage.setItem("categoryImages",JSON.stringify(categoryImages))
renderCategoryBlocks()

}

r.readAsDataURL(catFile)

}

let imgs=[]
let loaded=0

for(let i=0;i<files.length;i++){

let reader=new FileReader()

reader.onload=function(e){

imgs.push(e.target.result)

loaded++

if(loaded==files.length){

products.push({
name,
description:desc,
price,
discount,
stock,
whatsapp,
category,
images:imgs,
imgIndex:0
})

save()
renderProducts()
renderCategoryBlocks()

}

}

reader.readAsDataURL(files[i])

}

}

function priceInput(){return price.value}
function discountInput(){return discount.value||0}
function stockInput(){return stock.value}
function whatsappInput(){return whatsapp.value}
function categoryInput(){return category.value}

function renderProducts(){

productList.innerHTML=""

products.forEach((p,i)=>{

let final=(p.price-(p.price*p.discount/100)).toFixed(0)

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img id="img${i}" src="${p.images[p.imgIndex]}">

<div class="sliderBtns">

<button onclick="prevImg(${i})">◀</button>
<button onclick="nextImg(${i})">▶</button>

</div>

<h3>${p.name}</h3>

<div class="old">PKR ${p.price}</div>

<div class="price">PKR ${final}</div>

<div>Discount ${p.discount}%</div>

<button onclick="viewProduct(${i})">View</button>

<button onclick="editProduct(${i})">Edit</button>

<button onclick="orderProduct(${i})">Order</button>

<button onclick="deleteProduct(${i})" style="background:red">Delete</button>

`

productList.appendChild(card)

})

}

function nextImg(i){

let p=products[i]

p.imgIndex=(p.imgIndex+1)%p.images.length

document.getElementById("img"+i).src=p.images[p.imgIndex]

}

function prevImg(i){

let p=products[i]

p.imgIndex--

if(p.imgIndex<0)p.imgIndex=p.images.length-1

document.getElementById("img"+i).src=p.images[p.imgIndex]

}

function viewProduct(i){

let p=products[i]

let final=(p.price-(p.price*p.discount/100)).toFixed(0)

Swal.fire({

title:p.name,

html:`

<img src="${p.images[0]}" width="200"><br><br>

Price: ${p.price}<br>

Discount: ${p.discount}%<br>

Final Price: ${final}<br>

Stock: ${p.stock}<br><br>

${p.description}

`

})

}

function editProduct(i){

let p=products[i]

pname.value=p.name
description.value=p.description
price.value=p.price
discount.value=p.discount
stock.value=p.stock
whatsapp.value=p.whatsapp
category.value=p.category

editIndex=i

}

function updateProduct(){

if(editIndex==null)return

let p=products[editIndex]

p.name=pname.value
p.description=description.value
p.price=price.value
p.discount=discount.value
p.stock=stock.value
p.whatsapp=whatsapp.value
p.category=category.value

save()

renderProducts()

Swal.fire("Product Updated")

}

function deleteProduct(i){

products.splice(i,1)

save()

renderProducts()

}

function orderProduct(i){

let p=products[i]

let final=(p.price-(p.price*p.discount/100)).toFixed(0)

window.open(`https://wa.me/${p.whatsapp}?text=I want to order ${p.name} for PKR ${final}`)

}

function renderCategoryBlocks(){

categoryBlocks.innerHTML=""

let cats=[...new Set(products.map(p=>p.category))]

cats.forEach(c=>{

let img=categoryImages[c] || "https://cdn-icons-png.flaticon.com/512/263/263142.png"

let div=document.createElement("div")

div.className="cat"

div.innerHTML=`
<img src="${img}">
<br>
<b>${c}</b>
`

div.onclick=()=>filterCategory(c)

categoryBlocks.appendChild(div)

})

}

function filterCategory(cat){

productList.innerHTML=""

products.forEach((p,i)=>{

if(p.category==cat){

let final=(p.price-(p.price*p.discount/100)).toFixed(0)

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${p.images[0]}">

<h3>${p.name}</h3>

<div class="price">PKR ${final}</div>

<button onclick="viewProduct(${i})">View</button>

<button onclick="orderProduct(${i})">Order</button>

`

productList.appendChild(card)

}

})

}

function searchProduct(text){

text=text.toLowerCase()

productList.innerHTML=""

products.forEach((p,i)=>{

if(p.name.toLowerCase().includes(text)){

let final=(p.price-(p.price*p.discount/100)).toFixed(0)

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${p.images[0]}">

<h3>${p.name}</h3>

<div class="price">PKR ${final}</div>

<button onclick="viewProduct(${i})">View</button>

<button onclick="orderProduct(${i})">Order</button>

`

productList.appendChild(card)

}

})

}

renderProducts()
renderCategoryBlocks()

</script>

</body>
</html>
