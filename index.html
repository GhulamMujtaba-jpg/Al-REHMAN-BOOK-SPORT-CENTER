<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GM Online Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;margin:0;padding:0;background:#f0f8ff;color:#333;transition:.3s;}
header{background:#1e90ff;color:white;padding:15px;text-align:center;position:sticky;top:0;z-index:100;}
header h1{margin:0;font-size:24px;}
header button{margin:5px;padding:6px 12px;border:none;border-radius:5px;cursor:pointer;background:#ff4500;color:white;}
.container{padding:15px;}
input,select,button{padding:6px;margin:4px;border-radius:5px;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;margin-top:15px;}
.product-card{background:white;padding:10px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.2);text-align:center;}
.product-card img{width:100%;height:150px;object-fit:cover;border-radius:5px;margin-bottom:5px;}
.product-card button{margin-top:5px;background:#27ae60;color:white;border:none;padding:6px 12px;border-radius:5px;cursor:pointer;}
input[type="file"]{padding:3px;}
select{padding:6px;}
h2{color:#1e90ff;}
.dark{background:#333;color:white;}
.dark .product-card{background:#555;color:white;}
</style>
</head>
<body>

<header>
<h1>GM Online Store</h1>
<button onclick="toggleDarkMode()">Dark/Light</button>
</header>

<div class="container">

<h2>Add Product</h2>
<input id="pname" placeholder="Product Name">
<input type="number" id="price" placeholder="Price (PKR)">
<input type="number" id="discount" placeholder="Discount %">
<input type="number" id="stock" placeholder="Stock">
<input type="text" id="whatsapp" placeholder="WhatsApp Number">
<select id="category">
<option value="">Select Category</option>
<option value="Electronics">Electronics</option>
<option value="Fashion">Fashion</option>
<option value="Books">Books</option>
<option value="Other">Other</option>
</select>
<input type="file" id="pimages" accept="image/*" multiple>
<button onclick="addProduct()">Add Product</button>

<h2>Search Product</h2>
<input id="searchBox" placeholder="Search..." onkeyup="searchProduct()">

<h2>Products</h2>
<div class="products-grid" id="productList"></div>

</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

// Save products
function saveData(){
localStorage.setItem("products", JSON.stringify(products));
}

// Toggle dark mode
function toggleDarkMode(){
document.body.classList.toggle("dark");
}

// Add Product
function addProduct(){
let name = document.getElementById("pname").value.trim();
let price = parseFloat(document.getElementById("price").value);
let discount = parseFloat(document.getElementById("discount").value) || 0;
let stock = parseInt(document.getElementById("stock").value) || 0;
let whatsapp = document.getElementById("whatsapp").value.trim();
let category = document.getElementById("category").value;
let imageInput = document.getElementById("pimages");

if(!name || !price || !whatsapp || !imageInput.files.length){
alert("Fill all fields and upload at least 1 image");
return;
}

if(imageInput.files.length > 5){
alert("You can upload maximum 5 images per product");
return;
}

// Read images asynchronously
let files = Array.from(imageInput.files);
let images = [];
let loaded = 0;

files.forEach((file,index)=>{
let reader = new FileReader();
reader.onload = function(e){
images[index] = e.target.result;
loaded++;
if(loaded === files.length){
products.push({name,price,discount,stock,whatsapp,category,images});
saveData();
renderProducts();
}
};
reader.readAsDataURL(file);
});

// Clear inputs
document.getElementById("pname").value="";
document.getElementById("price").value="";
document.getElementById("discount").value="";
document.getElementById("stock").value="";
document.getElementById("whatsapp").value="";
document.getElementById("category").value="";
document.getElementById("pimages").value="";
}

// Render Products
function renderProducts(){
let list = document.getElementById("productList");
list.innerHTML="";
products.forEach((p,i)=>{
let card = document.createElement("div");
card.className="product-card";
let imagesHTML = p.images.map(img=>`<img src="${img}">`).join("");
let discountedPrice = (p.price - (p.price*p.discount/100)).toFixed(2);
card.innerHTML = `
${imagesHTML}
<b>${p.name}</b><br>
Category: ${p.category}<br>
Price: PKR ${p.price}<br>
Discount: ${p.discount}%<br>
Final: PKR ${discountedPrice}<br>
Stock: ${p.stock}<br>
<button onclick="orderProduct(${i})">Order via WhatsApp</button>
<button onclick="deleteProduct(${i})" style="background:#e74c3c;">Delete</button>
`;
list.appendChild(card);
});
}

// Search
function searchProduct(){
let value = document.getElementById("searchBox").value.toLowerCase();
let filtered = products.filter(p=>p.name.toLowerCase().includes(value) || p.category.toLowerCase().includes(value));
let list = document.getElementById("productList");
list.innerHTML="";
filtered.forEach((p,i)=>{
let card = document.createElement("div");
card.className="product-card";
let imagesHTML = p.images.map(img=>`<img src="${img}">`).join("");
let discountedPrice = (p.price - (p.price*p.discount/100)).toFixed(2);
card.innerHTML = `
${imagesHTML}
<b>${p.name}</b><br>
Category: ${p.category}<br>
Price: PKR ${p.price}<br>
Discount: ${p.discount}%<br>
Final: PKR ${discountedPrice}<br>
Stock: ${p.stock}<br>
<button onclick="orderProduct(${i})">Order via WhatsApp</button>
<button onclick="deleteProduct(${i})" style="background:#e74c3c;">Delete</button>
`;
list.appendChild(card);
});
}

// Order
function orderProduct(i){
let p = products[i];
if(p.stock <= 0){ alert("Out of stock!"); return; }
let discountedPrice = (p.price - (p.price*p.discount/100)).toFixed(2);
window.open(`https://wa.me/${p.whatsapp}?text=I want to order ${p.name} for PKR ${discountedPrice}`,"_blank");
}

// Delete
function deleteProduct(i){
if(confirm("Delete this product?")){
products.splice(i,1);
saveData();
renderProducts();
}
}

// Initial render
renderProducts();
</script>

</body>
</html>
