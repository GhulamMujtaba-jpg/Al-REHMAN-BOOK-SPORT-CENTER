<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Online Store</title>
<style>
  * {margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif;}
  body {background:#f0f0f0;}
  header {background:#222; color:white; padding:20px; text-align:center;}
  header h1 {font-size:2em;}
  
  /* Products Grid */
  .products {display:flex; flex-wrap:wrap; justify-content:center; margin:30px;}
  .product-card {
      background:white; border-radius:12px; box-shadow:0 6px 15px rgba(0,0,0,0.15);
      margin:15px; width:250px; overflow:hidden; text-align:center; transition:0.3s;
  }
  .product-card:hover {transform:translateY(-5px);}
  .product-card img {width:100%; height:200px; object-fit:cover;}
  .product-info {padding:15px;}
  .product-info h2 {font-size:1.3em; margin-bottom:8px;}
  .product-info p {font-size:0.9em; color:#555; margin-bottom:10px;}
  .price {font-size:1.2em; font-weight:bold;}
  .old-price {text-decoration:line-through; color:#888; font-size:0.9em; margin-left:5px;}
  .discount {color:#f57c00; font-weight:bold; margin-left:5px;}
  
  .btn {padding:10px 20px; border:none; border-radius:8px; cursor:pointer; text-decoration:none; color:white; margin:5px;}
  .add-cart {background:#f57c00;}
  .buy-now {background:#0b8043;}
  .btn:hover {opacity:0.9;}
  
  /* Cart Popup */
  #cart-modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;}
  #cart-content {background:white; padding:20px; border-radius:12px; width:90%; max-width:500px; max-height:80%; overflow-y:auto;}
  #cart-content h2 {margin-bottom:15px;}
  #cart-items {margin-bottom:15px;}
  .cart-item {display:flex; justify-content:space-between; margin-bottom:10px;}
  .cart-close {background:red; color:white; border:none; padding:5px 10px; border-radius:5px; float:right; cursor:pointer;}
  
  @media(max-width:768px){
    .products {flex-direction:column; align-items:center;}
    .product-card {width:90%;}
  }
</style>
</head>
<body>

<header>
  <h1>Mini Online Store</h1>
</header>

<section class="products" id="product-list">
  <!-- Products will be injected here -->
</section>

<!-- Cart Modal -->
<div id="cart-modal">
  <div id="cart-content">
    <button class="cart-close" onclick="closeCart()">X</button>
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <div>Total: $<span id="cart-total">0</span></div>
    <button class="buy-now" onclick="checkout()">Checkout via WhatsApp</button>
  </div>
</div>

<script>
  // Products Data
  const products = [
    {id:1, name:"Professional Calculator", price:29.99, oldPrice:49.99, discount:40, img:"https://erikayew.com/wp-content/uploads/2024/07/BMSM-1.jpg"},
    {id:2, name:"Scientific Calculator", price:39.99, oldPrice:59.99, discount:33, img:"https://erikayew.com/wp-content/uploads/2024/07/BMSM-1.jpg"},
    {id:3, name:"Office Desk Calculator", price:24.99, oldPrice:39.99, discount:36, img:"https://erikayew.com/wp-content/uploads/2024/07/BMSM-1.jpg"}
  ];

  let cart = [];

  // Render Products
  const productList = document.getElementById("product-list");
  products.forEach(p=>{
    const card = document.createElement("div");
    card.className = "product-card";
    card.innerHTML = `
      <img src="${p.img}" alt="${p.name}">
      <div class="product-info">
        <h2>${p.name}</h2>
        <p>High quality product for home & office use</p>
        <div class="price">$${p.price} <span class="old-price">$${p.oldPrice}</span> <span class="discount">${p.discount}% OFF</span></div>
        <div>
          <button class="btn add-cart" onclick="addToCart(${p.id})">Add to Cart</button>
          <a href="https://wa.me/1234567890?text=I want to buy ${encodeURIComponent(p.name)}" class="btn buy-now" target="_blank">Buy Now</a>
        </div>
      </div>
    `;
    productList.appendChild(card);
  });

  // Cart Functions
  function addToCart(id){
    const product = products.find(p=>p.id===id);
    cart.push(product);
    openCart();
    renderCart();
  }

  function renderCart(){
    const cartItems = document.getElementById("cart-items");
    cartItems.innerHTML = "";
    let total = 0;
    cart.forEach((item, index)=>{
      total += item.price;
      const div = document.createElement("div");
      div.className = "cart-item";
      div.innerHTML = `${item.name} - $${item.price.toFixed(2)} <button onclick="removeItem(${index})">Remove</button>`;
      cartItems.appendChild(div);
    });
    document.getElementById("cart-total").innerText = total.toFixed(2);
  }

  function removeItem(index){
    cart.splice(index,1);
    renderCart();
  }

  function openCart(){
    document.getElementById("cart-modal").style.display = "flex";
  }

  function closeCart(){
    document.getElementById("cart-modal").style.display = "none";
  }

  function checkout(){
    if(cart.length === 0){ alert("Cart is empty"); return; }
    let message = "I want to buy:%0A";
    cart.forEach(item=>{message+=`- ${item.name} ($${item.price.toFixed(2)})%0A`});
    const url = `https://wa.me/1234567890?text=${message}`;
    window.open(url,'_blank');
  }
</script>

</body>
</html>
