<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GM Auto Sales System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.dashboard{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.box{
background:white;
padding:15px;
flex:1;
min-width:150px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
text-align:center;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 15px;
margin:5px;
cursor:pointer;
border:none;
background:#3498db;
color:white;
border-radius:5px;
}

button:hover{
background:#2980b9;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

.records{
margin-top:30px;
}

</style>
</head>

<body>

<header>
GM Auto Sales System
</header>

<div class="container">

<div class="dashboard">

<div class="box">
<h3>Today Sale</h3>
<h2 id="todaySale">0</h2>
</div>

<div class="box">
<h3>Overall Sale</h3>
<h2 id="overallSale">0</h2>
</div>

<div class="box">
<h3>Overall Profit</h3>
<h2 id="overallProfit">0</h2>
</div>

</div>

<button onclick="clearDashboard()">Dashboard Clear</button>
<button onclick="nextDay()">Next Day</button>

<hr>

<h3>Add Product</h3>

<input id="name" placeholder="Product Name">
<input id="costp" type="number" placeholder="Cost Price">
<input id="salep" type="number" placeholder="Sale Price">
<input id="stock" type="number" placeholder="Stock">

<button onclick="addProduct()">Add Product</button>

<br><br>

<button onclick="renderProducts()">Card View</button>
<button onclick="showTableView()">Table View</button>

<div id="productList"></div>

<div class="records">

<h3>Daily Records</h3>

<div id="dailyRecords"></div>

</div>

</div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[];
let sales=JSON.parse(localStorage.getItem("sales"))||[];
let currentDay=localStorage.getItem("day")||1;

function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("sales",JSON.stringify(sales));
localStorage.setItem("day",currentDay);
}

function addProduct(){

let name=document.getElementById("name").value;
let costp=parseFloat(document.getElementById("costp").value);
let salep=parseFloat(document.getElementById("salep").value);
let stock=parseInt(document.getElementById("stock").value);

products.push({
name,
costp,
salep,
stock,
sold:0
});

save();
renderProducts();

}

function renderProducts(){

let list=document.getElementById("productList");
list.innerHTML="";

products.forEach((p,index)=>{

let div=document.createElement("div");

div.className="card";

div.innerHTML=`
<b>${p.name}</b><br>
Cost: ${p.costp}<br>
Sale: ${p.salep}<br>
Sold: ${p.sold}<br>
Stock: ${p.stock}<br><br>

<button onclick="increase(${index})">+</button>
<button onclick="decrease(${index})">-</button>
`;

list.appendChild(div);

});

updateDashboard();

}

function showTableView(){

let list=document.getElementById("productList");

list.innerHTML="";

let table=document.createElement("table");

let header=`
<tr>
<th>Name</th>
<th>Cost</th>
<th>Sale</th>
<th>Sold</th>
<th>Stock</th>
<th>Action</th>
</tr>
`;

let rows="";

products.forEach((p,index)=>{

rows+=`
<tr>
<td>${p.name}</td>
<td>${p.costp}</td>
<td>${p.salep}</td>
<td>${p.sold}</td>
<td>${p.stock}</td>
<td>
<button onclick="increase(${index})">+</button>
<button onclick="decrease(${index})">-</button>
</td>
</tr>
`;

});

table.innerHTML=header+rows;

list.appendChild(table);

}

function increase(i){

let p=products[i];

if(p.stock>0){

p.stock--;
p.sold++;

let profit=p.salep-p.costp;

sales.push({
day:currentDay,
sale:p.salep,
profit
});

save();
renderProducts();
renderDailyRecords();

}

}

function decrease(i){

let p=products[i];

if(p.sold>0){

p.stock++;
p.sold--;

save();
renderProducts();

}

}

function updateDashboard(){

let today=0;
let overall=0;
let profit=0;

sales.forEach(s=>{

overall+=s.sale;
profit+=s.profit;

if(s.day==currentDay){
today+=s.sale;
}

});

document.getElementById("todaySale").innerText=today;
document.getElementById("overallSale").innerText=overall;
document.getElementById("overallProfit").innerText=profit;

}

function renderDailyRecords(){

let box=document.getElementById("dailyRecords");

box.innerHTML="";

let days=[...new Set(sales.map(s=>s.day))];

days.forEach(day=>{

let total=sales.filter(s=>s.day==day)
.reduce((a,b)=>a+b.sale,0);

let div=document.createElement("div");

div.className="card";

div.innerHTML=`
Day ${day} : Sale ${total}
`;

box.appendChild(div);

});

}

function nextDay(){

currentDay++;

products.forEach(p=>p.sold=0);

save();
renderProducts();

}

function clearDashboard(){

if(confirm("Clear dashboard values only?")){

document.getElementById("todaySale").innerText=0;
document.getElementById("overallSale").innerText=0;
document.getElementById("overallProfit").innerText=0;

}

}

renderProducts();
renderDailyRecords();

</script>

</body>
</html>
