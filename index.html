<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GM Online Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#36d1dc,#5b86e5,#ff9966,#ff5e62);
background-size:400% 400%;
animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

header{
background:#2c3e50;
color:white;
text-align:center;
padding:15px;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

input,button{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#27ae60;
color:white;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,.3);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:6px;
}

.thumb{
width:50px;
height:50px;
margin:3px;
border-radius:4px;
}

.price{
font-size:18px;
color:#27ae60;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:red;
}

.delete{
background:red;
}

.download{
background:#3498db;
}

</style>
</head>

<body>

<header>
<h1>GM Online Store</h1>
</header>

<div class="container">

<h2>Add Product</h2>

<input id="pname" placeholder="Product Name">

<input type="number" id="price" placeholder="Price PKR">

<input type="number" id="discount" placeholder="Discount %">

<input type="number" id="stock" placeholder="Stock">

<input id="whatsapp" placeholder="WhatsApp Number">

<input id="category" placeholder="Category">

<input type="file" id="images" multiple accept="image/*">

<button onclick="addProduct()">Add Product</button>

<h2>Products</h2>

<div class="products" id="productList"></div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function save(){
localStorage.setItem("products",JSON.stringify(products));
}

function addProduct(){

let name=document.getElementById("pname").value;
let price=parseFloat(document.getElementById("price").value);
let discount=parseFloat(document.getElementById("discount").value)||0;
let stock=parseInt(document.getElementById("stock").value)||0;
let whatsapp=document.getElementById("whatsapp").value;
let category=document.getElementById("category").value;

let files=document.getElementById("images").files;

if(!name||!price||!whatsapp||files.length==0){
alert("Fill all fields");
return;
}

if(files.length>5){
alert("Max 5 images allowed");
return;
}

let images=[];
let count=0;

for(let i=0;i<files.length;i++){

let reader=new FileReader();

reader.onload=function(e){

images.push(e.target.result);

count++;

if(count===files.length){

products.push({
name:name,
price:price,
discount:discount,
stock:stock,
whatsapp:whatsapp,
category:category,
images:images
});

save();
renderProducts();

}

}

reader.readAsDataURL(files[i]);

}

}

function renderProducts(){

let list=document.getElementById("productList");

list.innerHTML="";

products.forEach((p,i)=>{

let final=(p.price-(p.price*p.discount/100)).toFixed(0);

let thumbs="";

p.images.forEach(img=>{
thumbs+=`<img src="${img}" class="thumb">`;
});

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${p.images[0]}">

<h3>${p.name}</h3>

<div>Category: ${p.category}</div>

<div class="old">PKR ${p.price}</div>

<div class="price">PKR ${final}</div>

<div>Stock: ${p.stock}</div>

<div>${thumbs}</div>

<button onclick="orderProduct(${i})">Order WhatsApp</button>

<button class="download" onclick="downloadImages(${i})">Download Images</button>

<button class="delete" onclick="deleteProduct(${i})">Delete</button>

`;

list.appendChild(card);

});

}

function orderProduct(i){

let p=products[i];

let final=(p.price-(p.price*p.discount/100)).toFixed(0);

window.open(
`https://wa.me/${p.whatsapp}?text=I want to order ${p.name} for PKR ${final}`
);

}

function deleteProduct(i){

if(confirm("Delete product?")){

products.splice(i,1);

save();

renderProducts();

}

}

function downloadImages(i){

let p=products[i];

p.images.forEach((img,index)=>{

let a=document.createElement("a");

a.href=img;

a.download=p.name+"_image"+(index+1)+".png";

a.click();

});

}

renderProducts();

</script>

</body>
</html>
