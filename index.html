<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Store Simple GitHub Version</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{--primary:#27ae60;}
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#6dd5ed,#2193b0,#cc2b5e,#753a88);background-size:400% 400%;animation:bgMove 10s infinite alternate;}
@keyframes bgMove{0%{background-position:left;}100%{background-position:right;}}
body.dark{background:#1e1e1e;color:white;}
header{background:#2c3e50;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;}
#darkToggle{padding:6px 12px;border:none;border-radius:5px;background:#27ae60;color:white;cursor:pointer;}
.cover{width:100%;height:250px;background:url("https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da") center/cover;display:flex;align-items:center;justify-content:center;color:white;font-size:40px;font-weight:bold;text-shadow:2px 2px 10px black;}
.container{max-width:1200px;margin:auto;padding:20px;}
input,textarea,button{padding:8px;margin:5px;border-radius:6px;border:none;width:100%;}
textarea{resize:none;}
button{background:#27ae60;color:white;cursor:pointer;}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:20px;}
.card{background:white;padding:10px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,.3);}
body.dark .card{background:#2c2c2c;color:white;}
.card img{width:100%;height:180px;object-fit:cover;border-radius:6px;}
.price{font-size:18px;color:#27ae60;font-weight:bold;}
.old{text-decoration:line-through;color:red;}
#dropArea{border:2px dashed #27ae60;padding:20px;border-radius:10px;text-align:center;cursor:pointer;}
#dropArea.dragover{background:rgba(39,174,96,0.1);}
</style>
</head>

<body>

<header>
<h1>GM Store Simple</h1>
<button id="darkToggle" onclick="toggleDark()">Dark Mode</button>
</header>

<div class="cover">Welcome To GM Store</div>

<div class="container">

<div id="loginPanel">
<h2>Admin Login</h2>
<input id="adminUser" placeholder="Username">
<input type="password" id="adminPass" placeholder="Password">
<button onclick="adminLogin()">Login</button>
</div>

<div id="adminDashboard" style="display:none">
<h2>Add / Edit Product</h2>
<input id="pname" placeholder="Product Name">
<textarea id="description" placeholder="Product Description"></textarea>
<input type="number" id="price" placeholder="Price">
<input type="number" id="discount" placeholder="Discount %">
<input type="number" id="stock" placeholder="Stock">
<input id="whatsapp" placeholder="WhatsApp Number">
<input id="category" placeholder="Category" list="categoryList">
<datalist id="categoryList"></datalist>

<div id="dropArea">
<p>Drag & Drop Images Here or Click</p>
<input type="file" id="images" multiple accept="image/*" style="display:none">
</div>

<button id="addBtn" onclick="addProduct()">Add Product</button>
<button id="updateBtn" style="display:none" onclick="updateProduct()">Update Product</button>
<button onclick="viewProducts()" style="background:#3498db">View Products</button>

<h2>Products</h2>
<div id="productList" class="products"></div>
</div>

</div>

<script>
function toggleDark(){document.body.classList.toggle("dark");}

function adminLogin(){
let u=document.getElementById("adminUser").value;
let p=document.getElementById("adminPass").value;
if(u==="admin" && p==="admin"){
document.getElementById("loginPanel").style.display="none";
document.getElementById("adminDashboard").style.display="block";
Swal.fire({icon:"success",title:"Welcome Admin",timer:1200,showConfirmButton:false});
}else{Swal.fire({icon:"error",title:"Invalid Login"});}
}

const dropArea=document.getElementById("dropArea");
const fileInput=document.getElementById("images");
dropArea.onclick=()=>fileInput.click();
dropArea.addEventListener("dragover",e=>{e.preventDefault();dropArea.classList.add("dragover");});
dropArea.addEventListener("dragleave",()=>{dropArea.classList.remove("dragover");});
dropArea.addEventListener("drop",e=>{
e.preventDefault();dropArea.classList.remove("dragover");
const dt=new DataTransfer();
for(let file of e.dataTransfer.files){dt.items.add(file);}
fileInput.files=dt.files;
});

let products=JSON.parse(localStorage.getItem("products"))||[];
let editIndex=null;

function save(){localStorage.setItem("products",JSON.stringify(products));}

function updateCategoryList(){
let list=document.getElementById("categoryList");
list.innerHTML="";
let cats=[...new Set(products.map(p=>p.category))];
cats.forEach(c=>{let opt=document.createElement("option"); opt.value=c; list.appendChild(opt);});
}

function addProduct(){
let name=document.getElementById("pname").value.trim();
let desc=document.getElementById("description").value.trim();
let price=document.getElementById("price").value;
let discount=document.getElementById("discount").value||0;
let stock=document.getElementById("stock").value||0;
let whatsapp=document.getElementById("whatsapp").value.trim();
let category=document.getElementById("category").value.trim();
let files=fileInput.files;
if(!name||!price||!whatsapp||files.length===0){Swal.fire({icon:"error",title:"Fill all fields"});return;}
if(files.length>3){Swal.fire({icon:"error",title:"Max 3 images allowed"});return;}
let promises=[];
for(let i=0;i<files.length;i++){
promises.push(new Promise(resolve=>{
let reader=new FileReader();
reader.onload=e=>resolve(e.target.result);
reader.readAsDataURL(files[i]);
}));
}
Promise.all(promises).then(images=>{
products.push({name,description:desc,price,discount,stock,whatsapp,category,images});
save(); renderProducts(); updateCategoryList(); clearForm();
Swal.fire({icon:"success",title:"Product Added",timer:1000,showConfirmButton:false});
});
}

function editProduct(i){
let p=products[i];
document.getElementById("pname").value=p.name;
document.getElementById("description").value=p.description;
document.getElementById("price").value=p.price;
document.getElementById("discount").value=p.discount;
document.getElementById("stock").value=p.stock;
document.getElementById("whatsapp").value=p.whatsapp;
document.getElementById("category").value=p.category;
editIndex=i;
document.getElementById("updateBtn").style.display="inline-block";
document.getElementById("addBtn").style.display="none";
}

function updateProduct(){
if(editIndex===null)return;
let i=editIndex;
let name=document.getElementById("pname").value.trim();
let desc=document.getElementById("description").value.trim();
let price=document.getElementById("price").value;
let discount=document.getElementById("discount").value||0;
let stock=document.getElementById("stock").value||0;
let whatsapp=document.getElementById("whatsapp").value.trim();
let category=document.getElementById("category").value.trim();
let files=fileInput.files;

if(files.length>0){
let promises=[];
for(let j=0;j<files.length;j++){
promises.push(new Promise(resolve=>{
let reader=new FileReader();
reader.onload=e=>resolve(e.target.result);
reader.readAsDataURL(files[j]);
}));
}
Promise.all(promises).then(images=>{
products[i]={name,description:desc,price,discount,stock,whatsapp,category,images};
save(); renderProducts(); updateCategoryList(); clearForm();
Swal.fire({icon:"success",title:"Product Updated",timer:1000,showConfirmButton:false});
document.getElementById("updateBtn").style.display="none";
document.getElementById("addBtn").style.display="inline-block";
editIndex=null;
});
}else{
products[i]={...products[i],name,description:desc,price,discount,stock,whatsapp,category};
save(); renderProducts(); updateCategoryList(); clearForm();
Swal.fire({icon:"success",title:"Product Updated",timer:1000,showConfirmButton:false});
document.getElementById("updateBtn").style.display="none";
document.getElementById("addBtn").style.display="inline-block";
editIndex=null;
}
}

function clearForm(){
document.getElementById("pname").value="";
document.getElementById("description").value="";
document.getElementById("price").value="";
document.getElementById("discount").value="";
document.getElementById("stock").value="";
document.getElementById("whatsapp").value="";
document.getElementById("category").value="";
fileInput.value="";
editIndex=null;
document.getElementById("updateBtn").style.display="none";
document.getElementById("addBtn").style.display="inline-block";
}

function renderProducts(){
let list=document.getElementById("productList");
list.innerHTML="";
products.forEach((p,i)=>{
let final=(p.price-(p.price*p.discount/100)).toFixed(0);
let card=document.createElement("div");
card.className="card";
card.innerHTML=`
<img src="${p.images[0]}">
<h3>${p.name}</h3>
<p>${p.description}</p>
<div>Category: ${p.category}</div>
<div class="old">PKR ${p.price}</div>
<div class="price">PKR ${final}</div>
<div>Stock: ${p.stock}</div>
<button onclick="orderProduct(${i})">Order WhatsApp</button>
<button onclick="editProduct(${i})" style="background:#f39c12">Edit</button>
<button onclick="deleteProduct(${i})" style="background:red">Delete</button>
<button onclick="viewProductDetail(${i})" style="background:#3498db">View</button>
`;
list.appendChild(card);
});
}

function orderProduct(i){
let p=products[i];
let final=(p.price-(p.price*p.discount/100)).toFixed(0);
window.open(`https://wa.me/${p.whatsapp}?text=I want to order ${p.name} for PKR ${final}`);
}

function deleteProduct(i){
products.splice(i,1);
save(); renderProducts(); updateCategoryList();
}

function viewProductDetail(i){
let p = products[i];
let final = (p.price - (p.price * p.discount / 100)).toFixed(0);
let imagesHtml = p.images.map(img => `<img src="${img}" style="width:100%;margin-bottom:5px;border-radius:5px;">`).join('');
Swal.fire({
title: `${p.name}`,
html: `
${imagesHtml}
<p><strong>Description:</strong> ${p.description}</p>
<p><strong>Category:</strong> ${p.category}</p>
<p><strong>Price:</strong> PKR ${p.price}</p>
<p><strong>Discounted Price:</strong> PKR ${final}</p>
<p><strong>Stock:</strong> ${p.stock}</p>
<p><strong>WhatsApp:</strong> ${p.whatsapp}</p>
`,
width:600,
showCloseButton:true
});
}

// Optional: List all products in alert
function viewProducts(){
let msg="";
products.forEach((p,i)=>{msg+=`#${i+1} ${p.name} - ${p.category} - PKR ${(p.price-(p.price*p.discount/100)).toFixed(0)}\n`;});
if(msg===""){msg="No products available";}
Swal.fire({title:"Product List",html:`<pre style="text-align:left">${msg}</pre>`,width:500});
}

renderProducts(); updateCategoryList();
</script>

</body>
</html>
