<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy More Save More - Sale</title>
<style>
    /* Reset & Base */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }
    body {
        background-color: #f0f0f0;
        color: #222;
    }

    /* Banner */
    .banner {
        background-image: url('https://erikayew.com/wp-content/uploads/2024/07/BMSM-1.jpg');
        background-size: cover;
        background-position: center;
        text-align: center;
        padding: 60px 20px;
        color: white;
        position: relative;
    }
    .banner h1 {
        font-size: 3em;
        text-shadow: 2px 2px #000;
        margin-bottom: 10px;
    }
    .banner p {
        font-size: 1.5em;
        text-shadow: 1px 1px #000;
    }

    /* Product Section */
    .product-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin: 40px 20px;
    }
    .product-card {
        background: white;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        max-width: 300px;
        margin: 20px;
        overflow: hidden;
        text-align: center;
        transition: transform 0.2s;
    }
    .product-card:hover {
        transform: translateY(-5px);
    }
    .product-card img {
        width: 100%;
        height: auto;
    }
    .product-info {
        padding: 20px;
    }
    .product-info h2 {
        font-size: 1.8em;
        margin-bottom: 10px;
    }
    .product-info p {
        font-size: 1em;
        color: #555;
        margin-bottom: 15px;
    }
    .price {
        font-size: 1.5em;
        font-weight: bold;
        margin-bottom: 10px;
    }
    .old-price {
        text-decoration: line-through;
        color: #888;
        font-size: 1em;
        margin-left: 10px;
    }
    .discount {
        color: #f57c00;
        font-weight: bold;
        margin-left: 5px;
    }

    /* Buttons */
    .product-buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 15px;
    }
    .btn {
        padding: 12px 25px;
        font-size: 1em;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        color: white;
        transition: 0.2s;
    }
    .buy-now {
        background-color: #0b8043;
    }
    .buy-now:hover {
        background-color: #0a6f38;
    }
    .add-cart {
        background-color: #f57c00;
    }
    .add-cart:hover {
        background-color: #e06b00;
    }

    /* Responsive */
    @media(max-width: 768px){
        .product-container {
            flex-direction: column;
            align-items: center;
        }
    }
</style>
</head>
<body>

    <!-- Banner -->
    <section class="banner">
        <h1>Buy More Save More!</h1>
        <p>Limited Time Offer - Grab Your Deal Now</p>
    </section>

    <!-- Product Section -->
    <section class="product-container">
        <div class="product-card">
            <img src="https://erikayew.com/wp-content/uploads/2024/07/BMSM-1.jpg" alt="Product Image">
            <div class="product-info">
                <h2>Professional Calculator</h2>
                <p>High quality, accurate calculator for home and office use. Large LCD display.</p>
                <div class="price">
                    $29.99 
                    <span class="old-price">$49.99</span>
                    <span class="discount">40% OFF</span>
                </div>
                <div class="product-buttons">
                    <a href="https://wa.me/1234567890?text=I%20want%20to%20buy%20the%20Professional%20Calculator" target="_blank" class="btn buy-now">Buy Now</a>
                    <a href="#" class="btn add-cart">Add to Cart</a>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
