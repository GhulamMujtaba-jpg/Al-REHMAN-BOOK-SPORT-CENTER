<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Store</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#6dd5ed,#2193b0,#cc2b5e,#753a88);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

header{
background:#2c3e50;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

button{
padding:8px;
margin:4px;
border:none;
border-radius:6px;
background:#27ae60;
color:white;
cursor:pointer;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

input,textarea{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:none;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.3);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:6px;
}

.price{
color:#27ae60;
font-weight:bold;
font-size:18px;
}

.old{
color:red;
text-decoration:line-through;
}

.categoryBlocks{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
margin-bottom:20px;
}

.cat{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
}

.cat img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
}

</style>
</head>

<body>

<header>
<h2>GM Store</h2>
</header>

<div class="container">

<h2>Categories</h2>
<div id="categoryBlocks" class="categoryBlocks"></div>

<h2>Admin Login</h2>

<input id="adminUser" placeholder="Username">
<input id="adminPass" type="password" placeholder="Password">

<button onclick="adminLogin()">Login</button>

<div id="adminDashboard" style="display:none">

<h2>Add Product</h2>

<input id="pname" placeholder="Product Name">
<textarea id="description" placeholder="Description"></textarea>

<input id="price" type="number" placeholder="Price">
<input id="discount" type="number" placeholder="Discount %">

<input id="stock" type="number" placeholder="Stock">

<input id="whatsapp" placeholder="WhatsApp Number">

<input id="category" placeholder="Category">

<h3>Category Profile Image</h3>
<input type="file" id="catImage">

<h3>Product Images</h3>
<input type="file" id="images" multiple>

<button onclick="addProduct()">Add Product</button>
<button onclick="updateProduct()">Update Product</button>

<h2>Products</h2>
<div id="productList" class="products"></div>

</div>
</div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[];
let categoryImages=JSON.parse(localStorage.getItem("categoryImages"))||{};
let editIndex=null;

function save(){
localStorage.setItem("products",JSON.stringify(products));
}

function adminLogin(){

let u=document.getElementById("adminUser").value;
let p=document.getElementById("adminPass").value;

if(u=="admin" && p=="admin"){

document.getElementById("adminDashboard").style.display="block";

Swal.fire("Login Success");

}else{

Swal.fire("Wrong Login");

}

}

function addProduct(){

let name=pname.value;
let desc=description.value;
let price=priceInput();
let discount=document.getElementById("discount").value||0;
let stock=document.getElementById("stock").value;
let whatsapp=document.getElementById("whatsapp").value;
let category=document.getElementById("category").value;

let files=document.getElementById("images").files;

let images=[];

for(let i=0;i<files.length;i++){

let reader=new FileReader();

reader.onload=function(e){

images.push(e.target.result);

if(images.length==files.length){

products.push({
name,description:desc,price,discount,stock,whatsapp,category,images
});

save();
renderProducts();
renderCategoryBlocks();

}

};

reader.readAsDataURL(files[i]);

}

}

function priceInput(){
return document.getElementById("price").value;
}

function renderProducts(){

let list=document.getElementById("productList");

list.innerHTML="";

products.forEach((p,i)=>{

let final=(p.price-(p.price*p.discount/100)).toFixed(0);

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${p.images[0]}">

<h3>${p.name}</h3>

<div class="old">PKR ${p.price}</div>

<div class="price">PKR ${final}</div>

<button onclick="viewProduct(${i})">View</button>

<button onclick="editProduct(${i})">Edit</button>

<button onclick="orderProduct(${i})">Order Now</button>

<button onclick="deleteProduct(${i})" style="background:red">Delete</button>

`;

list.appendChild(card);

});

}

function viewProduct(i){

let p=products[i];

Swal.fire({

title:p.name,
text:p.description,
imageUrl:p.images[0]

});

}

function editProduct(i){

let p=products[i];

document.getElementById("pname").value=p.name;
document.getElementById("description").value=p.description;
document.getElementById("price").value=p.price;
document.getElementById("discount").value=p.discount;
document.getElementById("stock").value=p.stock;
document.getElementById("whatsapp").value=p.whatsapp;
document.getElementById("category").value=p.category;

editIndex=i;

}

function updateProduct(){

if(editIndex==null) return;

products[editIndex].name=pname.value;
products[editIndex].description=description.value;
products[editIndex].price=price.value;
products[editIndex].discount=discount.value;

save();

renderProducts();

Swal.fire("Updated");

}

function orderProduct(i){

let p=products[i];

let final=(p.price-(p.price*p.discount/100)).toFixed(0);

window.open(`https://wa.me/${p.whatsapp}?text=I want to order ${p.name} for PKR ${final}`);

}

function deleteProduct(i){

products.splice(i,1);

save();

renderProducts();

}

function renderCategoryBlocks(){

let box=document.getElementById("categoryBlocks");

let cats=[...new Set(products.map(p=>p.category))];

box.innerHTML="";

cats.forEach(c=>{

let img=categoryImages[c] || "https://cdn-icons-png.flaticon.com/512/263/263142.png";

let div=document.createElement("div");

div.className="cat";

div.innerHTML=`
<img src="${img}">
<br>
<b>${c}</b>
`;

div.onclick=function(){
filterCategory(c);
};

box.appendChild(div);

});

}

function filterCategory(cat){

let list=document.getElementById("productList");

list.innerHTML="";

products.forEach((p,i)=>{

if(p.category==cat){

let final=(p.price-(p.price*p.discount/100)).toFixed(0);

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${p.images[0]}">

<h3>${p.name}</h3>

<div class="price">PKR ${final}</div>

<button onclick="orderProduct(${i})">Order</button>

`;

list.appendChild(card);

}

});

}

renderProducts();
renderCategoryBlocks();

</script>

</body>
</html>
